name: example

on:
  pull_request:
    paths:
      - .github/workflows/example.yaml
      - index.ts
      - package.json
  push:
    paths:
      - .github/workflows/example.yaml
      - index.ts
      - package.json
    branches:
      - main

jobs:
  do:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions: 
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            return await require('./index.ts').main({ core, context, github })
